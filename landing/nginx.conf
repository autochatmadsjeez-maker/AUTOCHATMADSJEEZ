worker_processes auto;
events { worker_connections 1024; }
http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  server_tokens off;

  # Compression
  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

  # Brotli would need module; gzip is enough for static landing

  server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Cache static assets long; HTML short for freshness
    location ~* \.(svg|png|jpg|jpeg|gif|webp|ico|woff2?|css|js)$ {
      expires 30d;
      add_header Cache-Control "public, max-age=2592000, immutable";
      try_files $uri =404;
    }

    location = /robots.txt { expires 1d; add_header Cache-Control "public, max-age=86400"; }
    location = /sitemap.xml { expires 1d; add_header Cache-Control "public, max-age=86400"; }

    location / {
      add_header Cache-Control "public, max-age=300, must-revalidate";
      try_files $uri $uri/ /index.html;
    }

    location = /healthz { access_log off; return 200 "ok"; add_header Content-Type text/plain; }
  }
}
